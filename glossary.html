<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {

    --bg-card: #16161a;

  .top-nav .spacer { flex: 1; }
  .top-nav .brand { font-weight: 700; font-size: 0.85rem; color: var(--text-white); }

<script>
const glossary = {
  "11 S&P Sectors": "Refers to the eleven sectors that make up the S&P 500, tracked using ETFs as part of the Core Sector List.",
  "15's": "15 minute charts.",
  "200ma": "Two hundred period moving average, a key level especially on longer timeframes that many institutions trade against.",
  "20ma": "The twenty period moving average, often discussed in the context of a certain timeframe such as a 15 minute chart or daily chart.",
  "45 degree line": "The 45 degree line is a market profile nuance. It occurs when a 45 degree line can be drawn from the lowest point of a distribution to its widest point (TPO POC). This is a sign that sellers have painted themselves into a corner near the lows of the session and creates potential for an upward reversal in the next session.",
  "50ma": "Fifty period simple moving average.",
  "60's": "Hourly charts.",
  "acceptance": "When the market profile begins to build out or develop in a certain area, it is said that the market is accepting those prices. This can be measured either in time spent or amount of volume that is transacted. It is generally understood that Trader defines acceptance as more of a time dynamic than a volume one. A good rule of thumb is to look for at least two TPO periods to print in the accepted area. The acceptance confirms that a significant amount of market participants are transacting at those levels. Acceptance is the opposite of rejection.",
  "Advance Decline": "The advance decline line for the NYSE or Nasdaq. This is a figure composed of a net sum of the number of advancing stocks minus the number of declining stocks at any given moment in each of the two respective markets.",
  "Anchored VWAP (AVWAP)": "The anchored vwap, also sometimes referred to as the AVWAP is a technical analysis indicator that shows the volume weighted average price of a security from a specific starting point, or anchor. It differs from the traditional VWAP (volume weighted average price) which is a common day trading tool that resets and starts its calculation at the beginning of each trading day. Anchored VWAP is usually used on a longer than intraday timeframe by swing traders. It is effective when a technically significant event or time is used as a starting point to begin the calculation. This starting point is called the anchor, hence the name Anchored VWAP. Typical anchors are swing highs and lows, earnings announcement days, starts of gaps, or beginnings of weeks, months, or years.",
  "Anomalies": "An anomaly is a single price or price area that lacks symmetry, which creates an unusual shape in the profile. Anomalies represent structural weakness, and they are created through the usual combination of time and price. Rogue TPOs that are sitting at the far right and also small areas where the TPOs are perfectly lined up for multiple prices creating a flat right edge can all be anomalies. Carry them forward as weak structure, nothing more.",
  "At the Market": "If Trader is initiating a position at the market it simply means that limit orders are not being used and the position is being entered with no regard to price. This is used much more often on more liquid Nasdaq issues.",
  "ATH": "All Time High",
  "balance rules": "When a market is in balance, meaning that it is consolidating in a tight range of two or more days, then balance rules apply. The balance rules are nothing more than a framework of scenarios that could happen which prepare us for every possible outcome. The possible outcomes and how to trade them are: 1. Look above and go. Prices move above the high of balance and find acceptance and continue higher. The target should be double the balance area. 2. Look above and fail. Prices move above the balance high but fail to find acceptance and reverse back into the balance area. This is now a short with a stop above the high just outside of balance that was recently made, with a target to the opposing low end of the balance area. 3. Look below and go. Prices move below the low of balance and find acceptance and continue lower. The target should be double the balance area. 4. Look below and fail. Prices move below the balance low but fail to find acceptance and reverse back into balance. This is now a long with a stop below the low just outside of balance that was recently made, with a target to the opposing high end of the balance area.",
  "Beta": "A measure of volatility of a security in comparison to the market as a whole. In the broadcast we often say the stock has big beta when it is a very volatile mover.",
  "Black Swan": "A market event that is completely unpredictable and often without historical precedent. The sell-off on 2/27/07 would be considered a black swan event. By the same token the advance that followed it within three weeks pushing the market quickly back over the highs of 2/27 and much further could also be characterized this way.",
  "Body": "Referring to the body of a candlestick or the area that is between its open and close, disregarding its swing highs and lows which are represented by the shadows or wicks.",
  "Bottoming tail": "A candlestick pattern which is comprised of a relatively small body and a much larger shadow or wick which is pointing downwards (towards lower prices), indicating that within the time period of the candle, bears pushed prices low but by the end of the candle period were forced to retreat to an area either close to or above the open of the candle. Generally a bullish pattern, it requires that the tail or wick be at least twice the size of the body to be designated as a tail. It is the opposite of a Topping Tail and is often referred to as a hammer.",
  "Breadth": "Describing market breadth in terms of volume for the NYSE or the Nasdaq. This is a figure composed of the net sum of the amount of volume flowing into up stocks minus the amount of volume flowing into down stocks at any given moment in each of the two respective markets. Often the advance decline line is also referred to as breadth, but Trader differentiates between the two by using two separate terms. Generally, the Breadth is more important than the advance decline line.",
  "Broken Wing Butterfly": "A butterfly which can be either call or put whose strikes are not equidistant. In a regular butterfly there is equal distance from the long strike (wing) to the short strikes (body) and from the body to the other wing. Think of all butterflies as simply two verticals, one long and one short. The broken wing butterfly simply has the short vertical being wider than the long vertical. In exchange for some directional risk, the spread is opened for a lower price, often even a credit.",
  "Bull & Bear Trap": "An opening gap type of daytrade in which the trader seeks to exploit the psychological shock that longer term traders feel when faced with an opening print that is strongly opposite the prior days price action. A bull or bear trap is created when the prior days price action is overly biased in one direction, and the next day opens in an area that negates the entire prior days move, thereby causing everyone who held the stock the day before in the expectation of greater gains to experience shock and head for the exit.",
  "buyers shut off": "A multi-bar chart pattern where a number of up candles (usually 3 or more) are negated by one large down candle. The range of the red bar will totally span the entire range of the prior green bars. Quite powerful on daily charts but can be seen on smaller timeframes as well.",
  "buying tail": "A single print column that appears at the bottom of a market profile structure. The tail is usually made up of at least three or more TPOs. It is formed as a result of sellers drying up and not being present in high enough numbers to continue to move prices lower once they have fallen to an area that market participants perceive as an unfair low for the session. As the lack of sellers brings a strong imbalance of buying activity in reaction to the low price levels, prices quickly reverse higher, leaving the single print tail in their wake.",
  "BWB": "An abbreviation for Broken Wing Butterfly",
  "Candles Lining Up Same Size Bodies": "A name given to a group of candles on any timeframe that have relatively equal highs and lows and are alternating between green and red. The takeaway is simply that the market is very choppy and making 100% retracements in order to print that pattern.",
  "Christmas Tree": "This is any time that the core sector list is split 50/50 with half of the sectors in the red (negative on day) and half in the green (positive on day). Usually signals a sit on hands approach.",
  "composite profile": "A market profile chart that aggregates all of the volume of all of its distribution along the Y axis, forming peaks and valleys in areas of high and low volume.",
  "Core Sector List": "uses the S&P500 almost exclusively as the main benchmark to gauge bias and direction in all timeframes, it is important to know what sectors make up the S&P and how much weight they have. The Core Sector List is the 11 sectors that make up the S&P500 tracked using ETFs: Information Technology XLK (28.2%), Healthcare XLV (14.2%), Consumer Discretionary XLY (11.6%), Communication Services XLC (10.8%), Financials XLF (9.7%), Industrials XLI (8.3%), Consumer Staples XLP (7.0%), Utilities XLU (3.0%), Real Estate XLRE (2.6%), Materials XLB (2.6%), Energy XLE (3.9%).",
  "Diamonds": "The tracking stock or ETF for the Dow Jones Industrial Average. Its symbol is DIA.",
  "Doji": "A candlestick pattern in which the open and close are the same (or almost the same). The pattern indicates extreme indecision as prices move up (to form the upper shadow) and then move sharply down (forming the lower shadow), only to end up closing very near where they originally opened at the beginning of the time frame in question. The pattern also indicates a contraction of volatility.",
  "Doldrums": "The time period between 11:30 and 1pm in the markets which is generally characterized by lower overall volume and lack of trend.",
  "double distribution": "A market profile distribution that is split into two distributions that are separated by single prints. The general rule of thumb is to treat each distribution as if it were a separate day. Judge the current days bullishness or bearishness by which of the prior days distributions you find acceptance in. The end points of the single prints are often support or resistant points as well.",
  "Eighty Percent Rule": "A futures trading technique which operates under the assumption that if a market opens outside its value area (where 70% of the prior sessions volume traded) and then trades into value for two consecutive 30 minute periods, there is an 80% chance that the market will rotate all the way to the other side of value.",
  "ES": "The S&P 500 e-mini contract. In the broadcast we use this as our primary instrument to define market direction and effect short term trades when we have a bias in the market. This is the electronic contract that trades around the clock, as opposed to the pit traded contract. Futures contracts on are denoted by two letters and then a letter and a number to define their expiration month. The ES has four contract periods per year which expire in March, June, September, and December, denoted by the letters H, M, U, and Z.",
  "excess high": "A high characterized by a number of single prints that ends a move and is at the top of a daily market profile distribution. The minimum number of TPOs that is necessary to define an excess high is two. An excess high is the opposite of a poor high, which has no single prints and is flat along the high where the TPOs line up next to each other.",
  "excess low": "A low characterized by a number of single prints that ends a move and is at the bottom of a daily market profile distribution. The minimum number of TPOs that is necessary to define an excess low is two. An excess low is the opposite of a poor low, which has no single prints and is flat along the low where the TPOs line up next to each other.",
  "Fade": "When a stock moves opposite the direction of its gap on an intraday basis.",
  "Five & Fifteen Minute Rules": "When stocks gap up or down through or very close to stops, Trader uses what we call the gap rule to exit the position. If a stock gaps down below the stop that has been established, wait for the first 15 minutes (up to 9:45am EST) to trade before doing anything. Then place a new protective stop just under the low of that first 15 minutes of trade.",
  "FOMO": "Fear Of Missing Out.",
  "gap rules": "Guidelines to follow on any day that the futures open outside of the prior days RTH range. 1. Go with all gaps that do not fill right away. 2. Larger gaps can often fail to fill on the first day or may fill only partially. 3. If the gap fills and value cannot get to at least overlapping, then the odds of a late day rally (on a gap up) or late day selloff (on a gap down) increase. 4. Gaps of larger than $20 in the /ES are difficult to trade and should be avoided early in the day.",
  "Gox": "$GOX or $GOX.X The AMEX Gold Index.",
  "h pattern": "A technical pattern that often brings about erratic action until it is resolved. The pattern is formed by a large down move that is relatively one sided with little consolidation within it, followed by a lower high bounce that then retests the prior low, forming a lower case h. The h stands for hell for shorts as most traders mistakenly short the retest of the initial low and are then frustrated when prices fail to move lower.",
  "halfback": "A term for the halfway point between the high and low of any session, could be a day session or an overnight session. On Peter's market profile charts it is always a dark yellow horizontal line at that level.",
  "Head and Shoulders": "A technical pattern or chart formation where a stock's price rises to a peak and subsequently declines. Then, price rises above the former peak making a higher high and again declines. Price then rises again, but not as high as the second peak and declines once more. These three peaks with the middle being the highest and lower highs on either side create a pattern in the image of a silhouette of a head and shoulders. The pattern is considered a bearish type of reversal.",
  "High Volume Node or HVN": "An area inside of a market profile where a very large amount of volume has traded. These areas generally act as magnets in the market and when they are tested the market tends to slow or bog down in that area.",
  "HOD": "High of Day",
  "HVN": "High Volume Node. An area on the market profile that would look very wide on a composite profile that has volume histograms on its Y axis. Markets are pulled towards high volume nodes and reject away from low volume nodes.",
  "Iceberg Tick": "The Iceberg Tick is a proprietary market internal indicator created by Trader that paints a visual picture of TICK action on the NYSE, Nasdaq, or various indices. The NYSE tick is one of the most powerful short term indicators but is often read improperly by many traders who focus on the absolute value of the tick or extreme readings. The Iceberg Tick shifts the trader's focus to how much time is being spent above or below zero which is far more important when trying to gauge the strength of an intraday move in the market.",
  "In-Between Periods": "Any time that is in between two reversal periods. Most often this call is made at roughly 10:15am EST. The theory being that the two main reversal periods of the morning session are the 10:00am and the 10:30. The time around 10:15am is either a continuation of a move that has begun in an earlier reversal period or a time of minor consolidation.",
  "Initial Balance": "The price range resulting from the markets trade during the first two 30 minute periods of the regular trading hours session. For the /ES contract, this would be the 9:30 to 10:30am EST period. When the initial balance is relatively narrow, you should expect that it will be knocked over at some point in the session and price will extend out of the initial balance (range extension). When the balance is wide, look for the initial balance range to possibly be the range for the entire session.",
  "Initiating Activity": "A more one sided trade that takes place when the market pushes out and away from a current balanced area, into a new level where it establishes a new area of value. Initiating activity is generally dominated by the other time frame participants. When the market is experiencing initiating activity, you do not want to fade or go against the trend.",
  "initiating trade": "The opposite of responsive trade. Initiating trade is when new money buyers or sellers step into the market and push prices to the next area of balance. Initiating activity is essentially the start of a new trend and often starts with a breakout of prices breaching certain levels that were thought to be support or resistance prior. Initiating trade should be accompanied by an increase in volume as new money joins in to commit to the higher or lower prices.",
  "Inside Day": "A day in which the entire range of price action from lows to highs is within or inside the prior days range. This pattern in candlestick terms is called harami and is a sign of a small pause in the prevailing trend before continuing onward rather than reversing.",
  "Internals": "Internals refers to market internals and is a blanket term to collectively describe the advance decline, breadth, 11 S&P sectors, weighted AD, and iceberg tick.",
  "Inverted": "A term used to define a situation when the major market averages or the internals are not either all positive or all negative. When we have inversion, it is a signal of a choppy market that is rangebound at the prior days close.",
  "Inverted Head and Shoulders": "A technical pattern or chart formation where a stock's price falls to a trough and subsequently rallies. Then, price falls below the former trough making a lower low and once again rallies. Price then declines again, but not as low as the second trough and rallies once more. These three troughs with the middle being the lowest create a pattern in the image of an upside down head and shoulders. The pattern is considered a bullish type of reversal.",
  "Jumbotron Stocks": "A short list of stocks that Brad and Peter watch closely every day for possible daytrading or option opportunities. These are expensive stocks that move quite a bit in absolute dollar terms and often in percentage terms as well. The current list includes: AAPL, AMZN, BABA, BKNG, FB, GOOGL, GS, ISRG, NFLX, NTES, NVDA, TSLA.",
  "LB": "liquidation break",
  "liquidation break": "A sudden selloff in the market that has the following characteristics: Often happens very early or late in the day; comes out of a pattern that does not suggest such a break should occur; has no definitive catalyst or news that drives it; has much faster tempo than the one already established; is often short-lived and will retrace 100% soon after or the next day. A liquidation break happens when short term traders get overly long and all panic out at once.",
  "LOD": "Low of Day",
  "Look Above and Fail": "A specific type of market movement where prices rise above the high of a balance area and then fall back into the balance area. The theory is that if this happens, there are strong odds that there will be price rotation back down to the low of the balance area.",
  "Look Below and Fail": "A specific type of market movement where prices fall below the low of a balance area and then rise back into the balance area. The theory is that if this happens, there are strong odds that there will be price rotation back up to the high of the balance area.",
  "Low Volume Node or LVN": "An area inside of a market profile where a very small amount of volume has traded. Usually an area that is rejected quickly by the market. The theory is that when markets trade to these areas, they will be rejected again as these are areas that do not represent value in the market.",
  "Lupe Fiasco": "A term Peter uses for any trade that has the potential to blow up into a large loss. Named after the rapper of the same name. Often shortened to just Lupe, such situations should be avoided at all costs.",
  "M.G.I.": "Market Generated Information.",
  "Market Internals": "A blanket term to collectively describe the advance decline, breadth, 11 S&P sectors, weighted AD, and iceberg tick.",
  "Market Profile": "A way of reading the market that recognizes either time spent or volume traded at a particular price level. A market profile can be either made up of TPOs (time price opportunities), or volume. TPOs measure how much time was spent at a particular price, while volume-based market profiles measure how much volume traded at a particular price. Trader utilizes volume based profiles.",
  "market profile key": "A key to understanding the market profile as Peter plots it using WindoTrader.",
  "Net Short": "The concept of being more short than long in an options spread by creating options spreads where you are selling more structures than you are buying or selling wider structures than the ones you are buying.",
  "New Business": "A term used for trades by market participants who are entering a new position in a security for the first time. This is in contrast to old business which is the term for trades that are closing or adjusting positions that were already entered in a previous session. The market generally transacts old business before new business.",
  "NQ": "The Nasdaq 100 E-Mini futures. In the broadcast we only discuss this contract in the pre-market to get a feel for where the Nasdaq will open.",
  "Old Business": "Any transactions in the market that are closing or adjusting positions that were already entered in a previous session. This is in contrast to new business. It is a general rule that the market transacts old business before it transacts new business.",
  "On Balance Volume": "A technical indicator developed by Joe Granville, the calculation of which relates volume to price change. OBV provides a running total of volume and shows whether this volume is flowing in or out of a given security. OBV attempts to detect when a financial instrument is being accumulated by a large number of buyers or sold by many sellers.",
  "one time framing": "A trending situation where in an uptrend the low of the previous bar or TPO period is not broken by two ticks or more. In a downtrend it would be reversed and the high of any previous bar or TPO period is not broken by two ticks or more.",
  "ONH": "Overnight High. A term mostly used in describing the futures market. To be precise, in the /ES this is the high made between 4:30pm EST and 9:30am EST the next day.",
  "ONL": "Overnight Low. A term mostly used for the futures market. To be precise, in the /ES this would be the lowest price between 4:30pm EST and 9:30am EST the next day.",
  "Opposing Tails": "A situation on 15 minute charts where the shadows or tails of two consecutive 15 minute candles point in different (opposing) directions. This indicates extreme indecision on an intraday chart as bulls and bears pushed prices both low and high over the last half hour but at the end of that time period ended little changed.",
  "OTF": "Other Time Frame - This is a term from the early days of market profile that simply denotes those market participants that are not active in the day time frame. Think: longer term buyers and sellers like swing or core.",
  "Other Time Frame": "A market profile term for those participants whose time frame and outlook is of a very long term, perhaps months or years. The theory is that it is these market players that are active when the market is experiencing initiating activity as opposed to responsive activity.",
  "Overhead Supply": "When a stock or index suffers a down move, the area to the left of current prices which is higher is an area of overhead supply. This is because as stocks move up back towards resistant areas we say that they have overhead supply because bulls will be waiting to get their money back as the stock rises back to levels that they purchased at.",
  "overnight inventory": "A way of measuring overnight activity in the futures market by noting how much of the overnight activity happens to fall above the prior days settlement value (4:15pm EST close) and how much falls below. If more activity is above the settlement, overnight inventory is said to be net long. If more is below, it is said to be net short.",
  "piling on effect": "A market dynamic where very current action is adding on to preceding action that was firmly in one direction. An example would be back to back trending days. The outcome to this is often a very sharp reversal in the opposite direction due to this effect.",
  "Pinch": "A term Peter uses often in Weekly Options Advisory live sessions to note when the 8 period EMA moves through the 21 period EMA on the SPX cash 30 minute chart. This can happen in either direction; there can be a pinch up or a pinch down.",
  "Pivot Points": "The calculations for the floor trader pivots that are sometimes used in the broadcast. The high, low and close used in the calculation is from the prior days values. Generally these values are derived from the E-mini S&P futures. The pivots can be calculated using 24 hour data or trading hours only data.",
  "POC": "Point of Control, also known as the fairest price to do business. It is the price level in the /ES where the greatest amount of volume in the prior RTH session traded.",
  "Point of Control": "Also called POC for short. The level in the futures inside the value area where either the greatest amount of volume traded in the prior session, or the greatest amount of time was spent as measured by the number of TPOs going across. Measured this way, the POC would be the widest part of any given market profile.",
  "poor high": "A poor high is one which lacks excess and is the opposite of an excess high. A poor high will have less than two TPOs of excess at the top of a daily range with at least 2-3 columns of TPOs lining up to form a flat looking top. It indicates that there are short term or weak handed longs at that high of day area.",
  "poor low": "A poor low is one which lacks excess and is the opposite of an excess low. A poor low will have less than two TPOs of excess at the bottom of a daily range with at least 2-3 columns of TPOs lining up to form a flat looking bottom. It indicates that there are short term or weak handed shorts at that low of day area.",
  "Prominent POC": "Prominent Point of Control. This is a point of control level measured by time and not volume which is very wide relative to other areas of the distribution. It is a price level where every single (or almost every) TPO period traded. Prominent POCs are important as they have greater odds of being tested in subsequent sessions than less prominent POC levels.",
  "Q's": "The tracking stock or ETF for the Nasdaq 100 Index. Its symbol is QQQ.",
  "rejection": "Prices are rejected when they move away from a key area quickly in the market profile. Rejection is often noted when prices move into make or break areas such as an ONH or ONL or prior days RTH high or low from outside of those areas. Rejection is the opposite of acceptance.",
  "Repair": "A market profile term for fixing profile distributions that are missing parts that would make them complete or more symmetrical. This concept is most often applied to poor highs and poor lows. Once a new session trades through these levels then it is as though the current activity was pasted onto the prior activity to complete the picture.",
  "Responsive Activity": "Two sided trade going back and forth between traders that have a short term outlook and are keeping prices contained within a range. This is the opposite of Initiating Activity. Responsive activity is usually defined by short time frame traders such as daytraders, or pit locals whose inventory has become imbalanced and needs to be corrected.",
  "responsive trade": "A responsive trade is a counter-trend trade taken against a specific level. The theory is that when two sided trade is taking place, there will not be enough momentum to push past key levels and buyers or sellers will respond to those areas, essentially pushing prices away from them. This is the opposite of breakout or initiative trade.",
  "Reversal Periods": "Generally the market tends to pivot or have inflection points at certain recurring times of the day. These times are 9:55-10:05, 10:25-10:35, 11am, 1pm, 2pm, 2:30pm and 3pm. Trader generally initiates positions around these times.",
  "Reverse Mullet": "A type of broken wing butterfly that has a wider long vertical than its short vertical. In a traditional BWB, the long vertical is more narrow than the short vertical which can allow the spread to be placed for less debit or even a credit. The reverse mullet always trades for a debit to open as the long vertical is wider than the short.",
  "Risk Reversal": "A catch all term for any trade that has a debit on one side (call or put) and a credit on the other. The purpose is to have the credit side pay for the debit side. The play is directional in the direction of the debit side.",
  "RTH": "Regular Trading Hours. In the /ES this means the price action from 9:30am EST to 4:15pm EST only.",
  "ruling reason": "A term that may or may not have been coined by James Dalton, our mentor in market profile. It means the current ethos, zeitgeist, feel, tone, essentially what is happening at this moment. It is that thing that is currently driving the market which can often fly in the face of all analysis and common sense.",
  "S.O.H.": "Literally, Sit On Hands. A term used when the market is choppy or erratic and the odds of trades on either side of the market have low odds of working out due to overall market indecision. This term is used often and is a warning against overtrading.",
  "Same Size Bodies": "A market phenomenon when fifteen minute bars that are next to each other are lined up and have bodies of the same size where the last candle is a mirror image of the previous one. Also described as Candles Lining Up, it is a pattern that shows a very choppy market that may be untradeable intraday.",
  "Sandwich Time": "The midday break in the broadcast between 11:30am and 1:30pm EST.",
  "sellers shut off": "A multi-bar chart pattern where a number of down candles (usually 3 or more) are negated by one large up candle. The range of the green bar will totally span the entire range of the prior red bars. Quite powerful on daily charts but can be seen on smaller timeframes as well.",
  "selling tail": "A single print column that appears at the top of a market profile structure. The tail is usually made up of at least three or more TPOs. It is formed as a result of buyers drying up and not being present in high enough numbers to continue to move prices higher once they have risen to an area that market participants perceive as an unfair high for the session.",
  "shock and awe": "A term Peter uses to describe what overnight futures traders may be feeling when faced with an open that is wildly divergent from what they expected. Large gaps in either direction that are opening well outside of range are examples of this.",
  "short in the hole": "A condition where late day sellers close price at or near lows but value and the volume POC remain much higher up in the RTH distribution.",
  "single prints": "Any section of the market profile distribution that is only one TPO wide. Single prints are a sign of emotional buying or selling as very little time was spent at those levels and thus there is no value there. The endpoints of single print sections are considered to be potential support or resistance points.",
  "Sox": "$SOX or $SOX.X. The Philadelphia Semiconductor Index. This index which tracks the leading chipmakers is discussed very often during the course of the trading day. Due to the heavy weighting of semiconductor companies throughout the Nasdaq Composite and Nasdaq 100 ($NDX), the Sox often leads the Nasdaq and is watched as another internal indicator.",
  "Spiders": "The SPDR or S&P depository receipt which is traded as a proxy for the entire S&P 500. It trades similar to the DIA or QQQ and its symbol is SPY.",
  "spike": "A set of single prints that are created in the last 30 minute session of the day which form at the top or bottom of a range.",
  "spike rules": "A framework for analyzing a spike on the next trading day after it is formed. If prices open above the spike, that is considered bullish. Prices opening within the spike confirm the higher prices of the spike. If prices open below the spike, that is considered bearish and is a potential reversal signal.",
  "Stalking": "A form of heads up for clientele to know that an official trade call is more than likely coming soon on the symbol being stalked. Generally announced before an intraday trade but often applied to any stocks currently on watch lists for possible position (swing) play.",
  "Taper": "A market profile term that Peter often calls out in the Weekly Options room. The taper is the tapering off of contract volume in the /ES as it moves to either the high or low of the day. Almost all highs and lows of a session are characterized by a diminishing of volume as price gets closer to the ultimate low or high of the day. The taper is a strong trading signal that the move underway may be over and the high or low of the day has been put in.",
  "Tattoo Profile": "A market profile distribution that is very symmetrical with about an equal amount of TPOs on either side of halfback and approximately the same amount of excess at each extreme. The thought being that if you were to request a market profile tattoo, it would be a picture of this sort of distribution.",
  "Tempo": "The speed at which the market is moving. This is also referred to as confidence. Slow tempo is typical of range bound days where there is lots of responsive activity. Fast tempo occurs when there is initiating activity, and market is breaking out of a range. Effective intraday futures trading involves gauging the tempo and knowing that opportunities are fewer and smaller when the tempo is slow.",
  "three premarket questions": "1. Are we opening in or out of balance? 2. Is overnight inventory net long or net short and by how much? 3. Where in relation to the entire overnight range are futures trading currently?",
  "three questions": "1. What is the market doing? (This is the general tone and bias that is currently in play) 2. What is the market trying to do? 3. How good of a job is the market doing getting there?",
  "Tick": "The net cumulative tick reading on the NYSE or Nasdaq Composite. This is measured by the number of stocks ticking up minus the number of stocks ticking down at any given moment. It is the least used of the internal indicators but is discussed from time to time. Generally the tick readings are only helpful when they are at extremes such as +1000 on the NYSE to indicate that program trading is ensuing.",
  "Top-Line Divergence": "An occurrence where the three major averages are diverging from each other. During top line divergence, there is some combination of either one of the three being positive with the other two negative or one negative and two being positive. This indicates a choppy session as there is relative strength in some indices which may be acting as a drag on the others.",
  "Top-Line Figures": "The top line figures are nothing more than the current levels of the Dow Jones Industrial Average, the S&P 500, and the Nasdaq Composite.",
  "Topping Tail": "A candlestick pattern which is comprised of a relatively small body and a much larger shadow or wick which is pointing upwards (towards higher prices), indicating that within the time period of the candle, bulls pushed prices high but by the end of the candle period were forced to retreat to an area either close to or below the open of the candle. Generally a bearish pattern. It is the opposite of a Bottoming tail, or Hammer pattern. Can also be called inverted hammer.",
  "TOPS": "Tops refers to the highest or lowest possible price that will be accepted to enter a trade when bidding or offering using limit orders. Therefore if the moderator says Shorting IBM at 84.60, 84.50 tops, it means that limit orders between 84.60 and 84.50 are being used to enter the position.",
  "TPO": "Stands for Time Price Opportunity. It is the smallest unit of measure displayed in any market profile graphic, denoted by a single letter. Each TPO represents a point of time where the market being charted trades at a specific price. A single TPO is printed on the chart every time that a certain price is touched during any time period. Typically, the periods are set to 30 minutes.",
  "TRIN": "The Traders Index, also called Arms Index after inventor Richard Arms. A complex fractional equation that takes into consideration the number of advancing stocks versus the number of decliners and also the respective volume of those two groups. Although TRIN readings over 1.0 are interpreted as bearish and readings below 1.0 are bullish, it is the trend of the TRIN that is most important.",
  "true gap": "A gap where price opens completely outside of the prior days range (either above the high or below the low). A true gap is always and only to a prior day's high or low, thus creating a true gap or space on the chart between one day and the next. Anything else is just a gap that has far less import.",
  "Unbalanced Butterfly": "A type of butterfly that is made up of one long vertical and two short verticals with all of the shorts being at the same strike. Also referred to as a 132 sometimes due to the number of options at each strike. Unbalanced butterflies can often be placed for credits due to the nature of selling twice as many verticals as are being bought.",
  "VAH": "Value Area High",
  "VAL": "Value Area Low",
  "Value": "This value has nothing to do with valuation. It denotes prices that are fair. Fair in this sense means a price that is common to a lot of participants. Value can be expressed as Value = Price + Time or Value = Price + Volume. In the futures market, this would be an area that is revisited a lot during a particular session or multiple sessions.",
  "Value Area": "A range where approximately 70% of the prior days volume traded. The range is derived from one standard deviation on either side of the mean which is roughly 70%.",
  "Value Area High": "The high end of the range of the value area.",
  "Value Area Low": "The low end of the range of the value area.",
  "VPOC": "Virgin Point of Control. This is a point of control level that has not yet been tested (traded through) during an RTH session. If the POC gets tested during an overnight session, it does not count and remains virgin until it happens during a day session.",
  "VPOC, Virgin Point of Control": "Any Point of Control (POC) that has not been tested during regular session trading hours of 9:30am to 4:15pm EST.",
  "VWAP": "Volume Weighted Average Price. VWAP starts fresh every morning at the open and starts to calculate as the day goes on and can be printed on a chart as the day progresses. The VWAP line can be an excellent setup for daytrades. Strong stocks that are making new two day highs are often buys when price pulls back to the VWAP line. Conversely, weak stocks making new two day lows are often shorts when they rise to the VWAP line.",
  "weak high": "A weak high is formed when a market rises and reverses right at a specific point which is often a technical or profile nuance. Some examples would be prior intraday highs, the upper extreme of a value area, the prior days settlement, or the current days open. The high is deemed weak because it can be taken easily when retested due to the short term nature of the sellers who initiated their positions at that level.",
  "weak low": "A weak low is formed when a market falls and reverses right at a specific point which is often a technical or profile nuance. Some examples would be prior intraday lows, the lower extreme of a value area, the prior days settlement, or the current days open. The low is deemed weak because it can be taken easily when retested due to the short term nature of the buyers who initiated their positions at that level.",
  "Weighted AD": "The Weighted AD is a market internal proprietary indicator created by Trader that gauges the strength or weakness of intraday moves in the market by plotting both an unweighted and a weighted histogram of how the 11 sectors are performing from the open.",
  "Zero Day Exploit Trade (ZDE)": "An options trade that is entered either on the day of expiry or the day before. Named after a computer security term. We are exploiting the extreme theta crush of the short time to expiry and also the potential delta in our favor as some of the options expire ITM. Generally done with spreads that are net short.",
  "Zero Line": "A term used to indicate parity in the internals. For instance if the breadth goes flat (advancing volume is equal to declining volume), we say it is sitting at the zero line.",
  "Zones 1,2,3": "The zone analysis is a way of discerning whether or not the S&P is trading within the upper, middle or lower third of the current days range. Once at least 45 minutes of trade have ensued, draw lines to divide the days range into three equal thirds. Label the upper third zone 1, the middle third zone 2, and the lower zone zone 3. When the market is trading in zone 1, there is an increased chance that stocks will remain strong. When trading in zone 3, odds favor weakness."
};

// Build the glossary
const container = document.getElementById('glossaryContainer');
const letterNav = document.getElementById('letterNav');
const searchInput = document.getElementById('searchInput');

function buildGlossary(filter = '') {
  container.innerHTML = '';
  const grouped = {};
  const lowerFilter = filter.toLowerCase();

  Object.entries(glossary).forEach(([term, def]) => {
    if (lowerFilter && !term.toLowerCase().includes(lowerFilter) && !def.toLowerCase().includes(lowerFilter)) return;
    const firstChar = term[0].match(/[a-zA-Z]/) ? term[0].toUpperCase() : '#';
    if (!grouped[firstChar]) grouped[firstChar] = [];
    grouped[firstChar].push({ term, def });
  });

  const keys = Object.keys(grouped).sort((a, b) => {
    if (a === '#') return 1;
    if (b === '#') return -1;
    return a.localeCompare(b);
  });

  document.getElementById('noResults').style.display = keys.length === 0 ? 'block' : 'none';

  // Letter nav
  if (!filter) {
    letterNav.innerHTML = '';
    const allLetters = [...new Set(Object.keys(glossary).map(t => {
      const c = t[0].toUpperCase();
      return c.match(/[A-Z]/) ? c : '#';
    }))].sort();
    allLetters.forEach(letter => {
      const a = document.createElement('a');
      a.href = '#letter-' + letter;
      a.textContent = letter;
      letterNav.appendChild(a);
    });
  }

  keys.forEach(letter => {
    const section = document.createElement('div');
    section.className = 'letter-section';
    section.id = 'letter-' + letter;

    const heading = document.createElement('div');
    heading.className = 'letter-heading';
    heading.textContent = letter;
    section.appendChild(heading);

    grouped[letter].forEach(({ term, def }) => {
      const card = document.createElement('div');
      card.className = 'term-card';
      card.innerHTML = `
        <div class="term-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="term-name">${term}</span>
          <span class="term-toggle">▼</span>
        </div>
        <div class="term-body">${def}</div>
      `;
      section.appendChild(card);
    });

    container.appendChild(section);
  });
}

searchInput.addEventListener('input', (e) => {
  buildGlossary(e.target.value);
});

buildGlossary();
</script>
